<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Online - Jugador</title>
    <style>
        /* RESET Y FONDOS */
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* LOGIN */
        #login-section { background-color: #1e1e1e; padding: 30px; border-radius: 10px; text-align: center; margin-top: 50px; border: 2px solid #ffc107; width: 90%; max-width: 400px; box-sizing: border-box; }
        #login-section input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 5px; border: none; box-sizing: border-box; font-size: 16px; }
        #login-section button { padding: 12px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        
        /* ENCABEZADO SUPERIOR (NORMAL - SIN STICKY) */
        #encabezado-fijo {
            width: 100%; z-index: 1000;
            background: #f1f3f5; color: #333; padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-bottom: 3px solid #ccc; box-sizing: border-box;
            display: none; /* Se muestra al loguearse */
            flex-direction: column; gap: 10px;
        }

        /* FILA SUPERIOR DEL ENCABEZADO */
        .top-info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 800px; margin: 0 auto; }
        
        /* Figura */
        .figura-box { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
        .figura-titulo { font-size: 10px; font-weight: 900; color: #555; text-transform: uppercase; margin-bottom: 3px; }
        #figura-objetivo { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; width: 40px; background-color: #333; padding: 2px; border: 1px solid #777; }
        .celda-figura { aspect-ratio: 1; background-color: #555; }
        .celda-figura.activa { background-color: #ffeb3b; }
        #nombre-figura-display { font-size: 9px; font-weight: bold; color: #666; margin-top: 3px; text-transform: uppercase; text-align: center; }

        /* FIGURAS MÚLTIPLES RECIBIDAS DEL ADMIN */
        .figuras-box { min-width: 110px; max-width: 170px; align-items: flex-start; }
        .figuras-multiples-display {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: flex-start;
            max-height: 95px;
            overflow-y: auto;
            padding: 2px 2px 4px 2px;
            box-sizing: border-box;
        }
        .figura-mini-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 48px;
            opacity: 1;
        }
        .figura-mini-item.inactiva { opacity: .35; filter: grayscale(1); }
        .figura-mini-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            width: 42px;
            background: #333;
            padding: 2px;
            border: 1px solid #777;
            border-radius: 3px;
            box-shadow: 0 2px 4px rgba(0,0,0,.18);
        }
        .figura-mini-grid .celda-figura { aspect-ratio: 1; background-color: #555; }
        .figura-mini-grid .celda-figura.activa { background-color: #ffeb3b; }
        .figura-mini-nombre {
            font-size: 8px;
            font-weight: 900;
            color: #444;
            margin-top: 2px;
            text-transform: uppercase;
            text-align: center;
            max-width: 52px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .figura-mini-estado { font-size: 7px; font-weight: 900; color: #28a745; line-height: 1; margin-bottom: 2px; }
        .figura-mini-item.inactiva .figura-mini-estado { color: #d32f2f; }
        #figura-objetivo.figura-fallback-oculta, #nombre-figura-display.figura-fallback-oculta { display: none; }
        @media (max-width: 480px) {
            .figuras-box { max-width: 128px; min-width: 96px; }
            .figuras-multiples-display { max-height: 82px; gap: 5px; }
            .figura-mini-item { width: 42px; }
            .figura-mini-grid { width: 36px; }
            .figura-mini-nombre { font-size: 7px; max-width: 42px; }
        }

        /* Centro (Balota y Reloj) */
        .centro-box { display: flex; flex-direction: column; align-items: center; }
        .balota-gigante {
            width: 70px; height: 70px;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #b71c1c);
            border-radius: 50%; border: 3px solid #8e0000; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        #main-letra { font-size: 14px; font-weight: bold; line-height: 1; margin-bottom: 2px; }
        #main-numero { font-size: 28px; font-weight: 900; line-height: 1; }
        
        .historial-bolas { display: flex; gap: 4px; margin-top: 5px; }
        .bola-historial {
            width: 22px; height: 22px; background: #495057; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold;
        }

        /* Contador */
        .contador-box { font-size: clamp(24px, 6vw, 40px); font-weight: 900; color: #d32f2f; min-width: 70px; text-align: right; }

        /* TABLERO 75 NÚMEROS */
        .tablero-75-grid {
            display: grid;
            grid-template-columns: auto repeat(15, 1fr);
            gap: 2px; width: 100%; max-width: 800px; margin: 0 auto;
            align-items: center;
        }
        .letra-75 {
            aspect-ratio: 1; border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: clamp(10px, 3vw, 18px); margin-right: 2px;
        }
        .num-75 {
            aspect-ratio: 1; width: 100%; background: #e9ecef; border: 1px solid #adb5bd; border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: clamp(8px, 2.8vw, 16px); color: #333; box-sizing: border-box; transition: 0.2s;
        }
        .num-75.activa { background: #ffeb3b; color: black; border: 2px solid #000; transform: scale(1.05); z-index: 2; }

        /* ZONA DE JUEGO (CARTÓN) */
        #game-section { display: none; width: 100%; max-width: 500px; text-align: center; padding: 20px 10px 50px 10px; box-sizing: border-box; }
        .info-jugador { background: #222; padding: 10px; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; font-size: 14px; }
        .info-jugador span { color: #ffc107; font-weight: bold; }
        
        .carton-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background-color: black; padding: 5px; border: 5px solid black; user-select: none; width: 100%; box-sizing: border-box; }
        .letra-bingo { background-color: #004080; color: white; font-size: 22px; font-weight: bold; padding: 10px 0; }
        .numero-carton { background-color: white; color: black; font-size: clamp(18px, 5vw, 24px); font-weight: 900; padding: clamp(10px, 4vw, 20px) 0; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .numero-carton:active { transform: scale(0.95); }
        .numero-carton.marcado { background-color: #ffeb3b; }
        .numero-carton.centro { background-color: #ccc; font-size: 20px; }

        #btn-bingo { background-color: #d32f2f; color: white; border: 4px solid white; border-radius: 15px; font-size: 26px; font-weight: 900; padding: 15px; width: 100%; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(211, 47, 47, 0.5); animation: latido 1.5s infinite; }
        #btn-bingo:active { transform: scale(0.95); }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="pantalla-ganador" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 20px; box-sizing: border-box;">
        <h1 style="color:#ffc107; font-size:50px; text-shadow: 0 0 20px #ffc107; margin-bottom:10px;">🏆 ¡BINGO! 🏆</h1>
        <h2 style="color:white; font-size:24px;">TENEMOS UN GANADOR</h2>
        <p id="texto-ganador" style="color:#28a745; font-size:35px; font-weight:900; margin:20px 0; text-transform: uppercase;">---</p>
        <p style="color:white; font-size:20px; background: #333; padding: 10px 20px; border-radius: 10px;">Con el Cartón #<span id="texto-carton-ganador" style="color:#00ffff; font-weight:bold;">---</span></p>
        
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 40px; width: 100%; max-width: 300px;">
            <button onclick="document.getElementById('pantalla-ganador').style.display='none'" style="padding:15px; font-size:16px; background:#004080; color:white; border:2px solid white; border-radius:10px; cursor:pointer; font-weight:bold;">JUGAR CON ESTE CARTÓN</button>
            <button onclick="location.reload()" style="padding:15px; font-size:16px; background:#d32f2f; color:white; border:2px solid white; border-radius:10px; cursor:pointer; font-weight:bold;">🔄 INGRESAR OTRO CARTÓN</button>
        </div>
    </div>

    <div id="login-section">
        <h2 style="color:#ffc107; margin-top:0;">Entrar a la Sala</h2>
        <input type="text" id="nombre-jugador" placeholder="Tu Nombre (opcional)">
        <input type="number" id="codigo-sala" placeholder="PIN de la Sala (6 dígitos)" style="font-size: 18px; font-weight: bold; text-align: center;">
        <input type="number" id="numero-carton" placeholder="N° de Cartón (Ej: 15)">
        <button onclick="entrarSala()">Ingresar al Juego</button>
    </div>

    <div id="encabezado-fijo">
        <div class="top-info-row">
            <div class="figura-box figuras-box">
                <div class="figura-titulo">FIGURAS ACTIVAS</div>
                <div id="figuras-multiples-display" class="figuras-multiples-display"></div>
                <div id="figura-objetivo"></div>
                <div id="nombre-figura-display">BINGO</div>
            </div>

            <div class="centro-box">
                <div class="balota-gigante">
                    <span id="main-letra">-</span>
                    <span id="main-numero">--</span>
                </div>
                <div id="historial-bolas" class="historial-bolas">
                    <div class="bola-historial">-</div><div class="bola-historial">-</div><div class="bola-historial">-</div><div class="bola-historial">-</div>
                </div>
            </div>

            <div class="contador-box" id="contador-balotas">0/75</div>
        </div>

        <div id="tablero-75" class="tablero-75-grid"></div>
    </div>

    <div id="game-section">
        <div class="info-jugador">
            Sala: <span id="display-sala">---</span> &nbsp;|&nbsp; Jugador: <span id="display-nombre">---</span>
        </div>

        <div id="comunicacion-box" style="display:none; background:#102027; border:2px solid #00ffff; border-radius:12px; padding:10px; margin:15px auto; max-width:450px; box-sizing:border-box;">
            <h3 style="margin:0 0 5px 0; color:#00ffff;">🔊 Radio en vivo</h3>
            <div id="estado-radio" style="color:#ffc107; font-weight:bold; font-size:14px;">Conectando al audio del administrador...</div>
            <button id="btn-activar-audio-radio" onclick="entrarRadioAdministrador()" style="display:none; padding:12px; background:#ffc107; color:#000; border:none; border-radius:8px; font-weight:900; width:100%; cursor:pointer; margin-top:8px;">🔊 TOCAR PARA ACTIVAR AUDIO</button>
            <div id="jitsi-player-container" style="position:absolute; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0; pointer-events:none; overflow:hidden;"></div>
        </div>

        <div id="chat-jugador-box" style="background:#132017; border:2px solid #28a745; border-radius:12px; padding:10px; margin:15px auto; max-width:450px; box-sizing:border-box; text-align:left;">
            <h3 style="margin:0 0 8px 0; color:#28ff7a; text-align:center;">💬 Enviar comentario al administrador</h3>
            <div style="display:flex; gap:8px; width:100%;">
                <input id="chat-jugador-input" maxlength="180" placeholder="Escribe tu comentario..." style="flex:1; padding:12px; border-radius:8px; border:1px solid #555; background:#fff; color:#000; font-size:15px; box-sizing:border-box; min-width:0;">
                <button onclick="enviarMensajeChat()" style="padding:12px 14px; background:#28a745; color:white; border:none; border-radius:8px; font-weight:900; cursor:pointer;">Enviar</button>
            </div>
            <small id="chat-jugador-status" style="display:block; color:#aaa; margin-top:6px; text-align:center;">El administrador leerá tu mensaje en vivo.</small>
        </div>
        <h3 style="margin: 0 0 10px 0; color: #ffc107; font-size: 24px;">CARTÓN #<span id="display-num-carton"></span></h3>

        <div id="mi-carton" style="width: 100%; max-width: 450px; margin: 0 auto;"></div>

        <button id="btn-bingo" onclick="cantarBingo()">¡CANTAR BINGO!</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGlCcqIxjX3c_GustIB7_vjtyFwZ_q010",
            authDomain: "bingo-sala-2-online.firebaseapp.com",
            projectId: "bingo-sala-2-online",
            storageBucket: "bingo-sala-2-online.firebasestorage.app",
            messagingSenderId: "865001524589",
            appId: "1:865001524589:web:45a97bd5231f16f4c01e64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let miCartonNumeros = [];
        let numCartonOficial = "";
        let balotasGlobales = [];
        let figuraGlobal = [];
        let figurasMultiplesGlobal = [];
        let miSalaActual = "";
        let miNombreActual = "";
        let miJugadorDocId = "";
        let meetRoomActual = "";
        let radioSessionActual = null;
        let radioPc = null;
        let radioJugadorRef = null;
        let radioUnsubDoc = null;

        const rtcRadioConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        function esperarIceCompleto(pc, maxMs = 6000) {
            return new Promise((resolve) => {
                if (!pc || pc.iceGatheringState === 'complete') return resolve();
                const timer = setTimeout(resolve, maxMs);
                const check = () => {
                    if (pc.iceGatheringState === 'complete') {
                        clearTimeout(timer);
                        pc.removeEventListener('icegatheringstatechange', check);
                        resolve();
                    }
                };
                pc.addEventListener('icegatheringstatechange', check);
            });
        }

        function asegurarAudioRadio() {
            let audio = document.getElementById('audio-radio-stream');
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = 'audio-radio-stream';
                audio.autoplay = true;
                audio.playsInline = true;
                audio.controls = false;
                document.getElementById('comunicacion-box').appendChild(audio);
            }
            return audio;
        }

        window.entrarRadioAdministrador = async () => {
            const comunicacionBox = document.getElementById('comunicacion-box');
            const estado = document.getElementById('estado-radio');
            const btnAudio = document.getElementById('btn-activar-audio-radio');
            const audio = asegurarAudioRadio();

            if (radioPc && ['failed', 'closed', 'disconnected'].includes(radioPc.connectionState)) {
                window.salirRadioAdministrador(false);
            }

            if (radioPc) {
                try {
                    await audio.play();
                    if (estado) estado.innerText = '✅ Audio en vivo conectado. Solo estás escuchando.';
                    if (btnAudio) btnAudio.style.display = 'none';
                } catch(e) {
                    if (estado) estado.innerText = 'Toca el botón para activar el audio.';
                    if (btnAudio) btnAudio.style.display = 'block';
                }
                return;
            }

            if(!miSalaActual || !radioSessionActual || !miJugadorDocId) {
                if (estado) estado.innerText = 'La radio aún no está disponible.';
                return;
            }

            if (comunicacionBox) comunicacionBox.style.display = 'block';
            if (estado) estado.innerText = 'Conectando al audio del administrador...';
            if (btnAudio) btnAudio.style.display = 'none';

            try {
                radioPc = new RTCPeerConnection(rtcRadioConfig);
                radioJugadorRef = doc(db, 'salas', miSalaActual, 'jugadores', miJugadorDocId);

                radioPc.ontrack = async (event) => {
                    audio.srcObject = event.streams[0];
                    try {
                        await audio.play();
                        if (estado) estado.innerText = '✅ Audio en vivo conectado. Solo estás escuchando.';
                        if (btnAudio) btnAudio.style.display = 'none';
                    } catch(e) {
                        if (estado) estado.innerText = 'Audio listo. Toca el botón para escucharlo.';
                        if (btnAudio) btnAudio.style.display = 'block';
                    }
                };

                radioPc.onconnectionstatechange = () => {
                    if (estado && radioPc) {
                        if (radioPc.connectionState === 'connected') estado.innerText = '✅ Audio en vivo conectado. Solo estás escuchando.';
                        if (radioPc.connectionState === 'failed') estado.innerText = 'No se pudo conectar el audio. Toca para reintentar.';
                    }
                };

                await setDoc(radioJugadorRef, {
                    nombre: miNombreActual || ('Jugador-' + numCartonOficial),
                    numeroCarton: numCartonOficial,
                    radioSession: radioSessionActual,
                    radioStatus: 'esperando_radio',
                    radioOffer: null,
                    radioAnswer: null,
                    radioPedidoEn: Date.now()
                }, { merge: true });

                radioUnsubDoc = onSnapshot(radioJugadorRef, async (snap) => {
                    const data = snap.data();
                    if (data && data.radioSession === radioSessionActual && data.radioOffer && radioPc && !radioPc.currentRemoteDescription) {
                        try {
                            await radioPc.setRemoteDescription(new RTCSessionDescription(data.radioOffer));
                            const answer = await radioPc.createAnswer();
                            await radioPc.setLocalDescription(answer);
                            await esperarIceCompleto(radioPc);
                            await updateDoc(radioJugadorRef, {
                                radioAnswer: {
                                    type: radioPc.localDescription.type,
                                    sdp: radioPc.localDescription.sdp
                                },
                                radioStatus: 'respuesta_enviada',
                                radioRespuestaEn: Date.now()
                            });
                        } catch(e) {
                            console.error('Error conectando radio:', e);
                            if (estado) estado.innerText = 'Error conectando el audio. Intenta recargar.';
                        }
                    }
                });

                setTimeout(() => {
                    if(estado && estado.innerText.includes('Conectando')) {
                        estado.innerText = 'Conexión lenta. Esperando audio del administrador...';
                        if(btnAudio) btnAudio.style.display = 'block';
                    }
                }, 8000);
            } catch(e) {
                console.error('No se pudo iniciar la radio WebRTC:', e);
                if(estado) estado.innerText = 'No se pudo iniciar el audio automático. Toca para reintentar.';
                if(btnAudio) btnAudio.style.display = 'block';
                window.salirRadioAdministrador(false);
            }
        };

        // Compatibilidad con versiones anteriores del botón, si quedó cacheado en algún navegador.
        window.entrarComunicacion = window.entrarRadioAdministrador;

        window.salirRadioAdministrador = async (limpiarFirebase = true) => {
            if (radioUnsubDoc) { try { radioUnsubDoc(); } catch(e) {} radioUnsubDoc = null; }
            if (radioPc) { try { radioPc.close(); } catch(e) {} radioPc = null; }
            const refParaLimpiar = radioJugadorRef;
            radioJugadorRef = null;

            if (limpiarFirebase && refParaLimpiar) {
                try {
                    await updateDoc(refParaLimpiar, {
                        radioStatus: 'detenido',
                        radioSession: null,
                        radioOffer: null,
                        radioAnswer: null
                    });
                } catch(e) {}
            }

            const audio = document.getElementById('audio-radio-stream');
            if (audio) {
                audio.pause();
                audio.srcObject = null;
                audio.remove();
            }
            const cont = document.getElementById('jitsi-player-container');
            const estado = document.getElementById('estado-radio');
            const btnAudio = document.getElementById('btn-activar-audio-radio');
            if(cont) cont.innerHTML = '';
            if(estado) estado.innerText = 'Radio detenida.';
            if(btnAudio) btnAudio.style.display = 'none';
        };

        window.salirComunicacion = window.salirRadioAdministrador;

        let chatEnterConfigurado = false;

        function configurarEnterChatJugador() {
            if (chatEnterConfigurado) return;
            const input = document.getElementById('chat-jugador-input');
            if (!input) return;
            chatEnterConfigurado = true;
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.enviarMensajeChat();
                }
            });
        }

        window.enviarMensajeChat = async () => {
            const input = document.getElementById('chat-jugador-input');
            const status = document.getElementById('chat-jugador-status');
            if (!input) return;

            const mensaje = input.value.trim();
            if (!mensaje) {
                if (status) status.innerText = 'Escribe un comentario antes de enviar.';
                return;
            }

            if (!miSalaActual || !miJugadorDocId) {
                alert('Primero debes ingresar a la sala.');
                return;
            }

            try {
                const jugadorRef = doc(db, 'salas', miSalaActual, 'jugadores', miJugadorDocId);
                await setDoc(jugadorRef, {
                    nombre: miNombreActual || ('Jugador-' + numCartonOficial),
                    numeroCarton: numCartonOficial,
                    chatUltimoMensaje: mensaje.slice(0, 180),
                    chatTimestamp: Date.now()
                }, { merge: true });

                input.value = '';
                if (status) {
                    status.innerText = '✅ Comentario enviado al administrador.';
                    status.style.color = '#28ff7a';
                    setTimeout(() => {
                        status.innerText = 'El administrador leerá tu mensaje en vivo.';
                        status.style.color = '#aaa';
                    }, 2500);
                }
            } catch (e) {
                console.error('Error enviando comentario:', e);
                if (status) {
                    status.innerText = 'No se pudo enviar. Revisa tu conexión.';
                    status.style.color = '#ff6b6b';
                }
            }
        };

        window.entrarSala = async () => {
            const sala = document.getElementById('codigo-sala').value.toUpperCase();
            const numCarton = document.getElementById('numero-carton').value;
            const nombreManual = document.getElementById('nombre-jugador').value.trim();
            const nombre = nombreManual || ("Jugador-" + numCarton);

            if (!sala || !numCarton) { alert("Escribe el PIN de la sala y el número de cartón."); return; }

            const btnLogin = document.querySelector('#login-section button');
            btnLogin.innerText = "Buscando cartón...";
            btnLogin.disabled = true;

            try {
                const salaRef = doc(db, "salas", sala);
                const salaDoc = await getDoc(salaRef);

                if (salaDoc.exists()) {
                    const datosSala = salaDoc.data();
                    
                    // --- NUEVA LÓGICA DE DESEMPAQUETADO ---
                    let todosLosCartones = null;

                    // 1. Verificamos si los cartones vienen en el nuevo formato "empaquetado"
                    if (datosSala.cartonesEmpaquetados) {
                        try {
                            todosLosCartones = JSON.parse(datosSala.cartonesEmpaquetados);
                        } catch (e) {
                            console.error("Error al desempaquetar cartones:", e);
                        }
                    } 
                    // 2. Por si acaso, mantenemos compatibilidad con el formato viejo
                    else if (datosSala.cartonesOficiales) {
                        todosLosCartones = datosSala.cartonesOficiales;
                    }

                    // 3. Si no hay cartones de ninguna forma, bloqueamos
                    if (!todosLosCartones) {
                        alert("El administrador aún no ha subido los cartones a esta sala.");
                        btnLogin.innerText = "Ingresar al Juego";
                        btnLogin.disabled = false;
                        return;
                    }

                    // 4. Buscamos el cartón específico del jugador
                    const cartonBuscado = todosLosCartones[numCarton];
                    
                    if (cartonBuscado) {
                        miCartonNumeros = cartonBuscado;
                        numCartonOficial = numCarton;

                        // Cambios de UI
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('encabezado-fijo').style.display = 'flex';
                        document.getElementById('game-section').style.display = 'block';
                        configurarEnterChatJugador();
                        
                        document.getElementById('display-sala').innerText = sala;
                        document.getElementById('display-nombre').innerText = nombre;
                        document.getElementById('display-num-carton').innerText = numCarton;

                        miSalaActual = sala;
                        miNombreActual = nombre;
                        miJugadorDocId = nombre;
                        meetRoomActual = datosSala.meetRoom || ("BingoRadio_" + sala);
                        radioSessionActual = datosSala.radioSession || datosSala.meetCreadaEn || Date.now();
                        if (datosSala.comunicacionActiva) {
                            document.getElementById('comunicacion-box').style.display = 'block';
                            setTimeout(() => entrarRadioAdministrador(), 300);
                        }

                        renderizarCarton();
                        inicializarTablero75();

                        // Registro Firebase
                        const jugadorRef = doc(db, "salas", sala, "jugadores", nombre);
                        await setDoc(jugadorRef, { nombre: nombre, numeroCarton: numCarton, conectadoEn: new Date() }, { merge: true });

                        window.ultimoGanadorVisto = 0; 
                        window.ultimoReinicioVisto = 0;

                        // Escucha en tiempo real
                        onSnapshot(salaRef, (docSnapshot) => {
                            if (docSnapshot.exists()) {
                                const datos = docSnapshot.data();
                                
                                // 1. Gatillo de Reinicio
                                if (datos.senalReinicio && window.ultimoReinicioVisto !== datos.senalReinicio) {
                                    window.ultimoReinicioVisto = datos.senalReinicio;
                                    limpiarPantallaJugador();
                                }

                                // Reemplaza los pasos 2 y 3 del onSnapshot por esto:

// 2. Actualizar Balotas
if (datos.balotasLlamadas && datos.balotasLlamadas.length > 0) {
    balotasGlobales = datos.balotasLlamadas; // <-- GUARDA EN MEMORIA
    actualizarDatosBalotas(datos.balotasLlamadas);
} else if (!datos.balotasLlamadas || datos.balotasLlamadas.length === 0) {
    balotasGlobales = []; // <-- LIMPIA LA MEMORIA
    limpiarPantallaJugador();
}

// 3. Actualizar figuras: recibe una o varias figuras y respeta cuáles están activas
actualizarFigurasDesdeSala(datos);

                                // 4. Radio en vivo: jugadores solo escuchan, sin micrófono ni cámara
                                const comunicacionBox = document.getElementById('comunicacion-box');
                                if (datos.comunicacionActiva) {
                                    meetRoomActual = datos.meetRoom || ("BingoRadio_" + sala);
                                    const nuevaSesionRadio = datos.radioSession || datos.meetCreadaEn || radioSessionActual || Date.now();
                                    if (radioPc && radioSessionActual && nuevaSesionRadio !== radioSessionActual) {
                                        salirRadioAdministrador();
                                    }
                                    radioSessionActual = nuevaSesionRadio;
                                    if (comunicacionBox) comunicacionBox.style.display = 'block';
                                    entrarRadioAdministrador();
                                } else {
                                    if (comunicacionBox) comunicacionBox.style.display = 'none';
                                    salirRadioAdministrador();
                                }

                                // 5. Ganador
                                if (datos.ganadorConfirmado) {
                                    if (window.ultimoGanadorVisto !== datos.ganadorConfirmado.timestamp) {
                                        window.ultimoGanadorVisto = datos.ganadorConfirmado.timestamp;
                                        document.getElementById('texto-ganador').innerText = datos.ganadorConfirmado.nombre;
                                        document.getElementById('texto-carton-ganador').innerText = datos.ganadorConfirmado.carton;
                                        document.getElementById('pantalla-ganador').style.display = 'flex';
                                    }
                                }
                            }
                        });
                    } else {
                        alert(`El Cartón #${numCarton} no existe en esta partida.`);
                        btnLogin.innerText = "Ingresar al Juego";
                        btnLogin.disabled = false;
                    }
                } else {
                    alert("La sala no existe.");
                    btnLogin.innerText = "Ingresar al Juego";
                    btnLogin.disabled = false;
                }
            } catch (error) {
                console.error("El error real es: ", error); // <- Agrega esta línea
                alert("Error de conexión al buscar el cartón.");
                btnLogin.innerText = "Ingresar al Juego";
                btnLogin.disabled = false;
            }
        };

        window.toggleMarca = (elemento) => { elemento.classList.toggle('marcado'); };

        window.cantarBingo = async () => {
            const figurasActivas = obtenerFigurasActivasJugador();

            if (!figurasActivas.length) {
                alert("Aún no hay figuras activas configuradas en la sala.");
                return;
            }

            const figurasCompletadas = obtenerFigurasCompletadasJugador(figurasActivas);

            if (!figurasCompletadas.length) {
                alert("¡FALSA ALARMA! Todavía te faltan números para completar alguna de las figuras activas.");
                return;
            }

            const nombre = document.getElementById('display-nombre').innerText.trim();
            const sala = document.getElementById('display-sala').innerText.trim();
            const btn = document.getElementById('btn-bingo');
            const nombresFiguras = figurasCompletadas.map(f => f.nombre || 'FIGURA').join(' + ');
            
            btn.innerText = "ENVIANDO...";
            try {
                const salaRef = doc(db, "salas", sala);
                const datosBingo = {
                    nombre: nombre,
                    carton: numCartonOficial,
                    timestamp: Date.now(),
                    figuras: nombresFiguras,
                    figurasCompletadas: figurasCompletadas.map(f => ({ nombre: f.nombre || 'FIGURA', patron: f.patron }))
                };

                console.log("Enviando Bingo a la sala:", sala, "Datos:", datosBingo);

                await updateDoc(salaRef, {
                    alertaBingo: datosBingo
                });
                
                btn.innerText = "¡BINGO ENVIADO!";
                btn.style.backgroundColor = "#28a745"; 
                alert(`¡Validación exitosa! Completaste: ${nombresFiguras}. Cartón #${numCartonOficial}.`);
                setTimeout(() => { btn.innerText = "¡CANTAR BINGO!"; btn.style.backgroundColor = "#d32f2f"; }, 5000);
            } catch (error) {
                console.error("Error exacto al enviar el Bingo a Firebase:", error);
                alert("Error al cantar Bingo. Revisa la conexión e intenta nuevamente.");
                btn.innerText = "¡CANTAR BINGO!";
            }
        };

        function limpiarPantallaJugador() {
            document.getElementById('main-letra').innerText = "-";
            document.getElementById('main-numero').innerText = "--";
            document.getElementById('contador-balotas').innerText = "0/75";
            document.getElementById('historial-bolas').innerHTML = '<div class="bola-historial">-</div>'.repeat(4);
            document.getElementById('pantalla-ganador').style.display = 'none';
            actualizarTablero75([]);
            document.querySelectorAll('.numero-carton').forEach(celda => {
                if(!celda.classList.contains('centro')) celda.classList.remove('marcado');
            });
        }

        function actualizarDatosBalotas(balotas) {
            // Ultima balota, letra y contador
            const ultima = balotas[balotas.length - 1];
            document.getElementById('main-numero').innerText = ultima;
            document.getElementById('main-letra').innerText = (ultima <= 15 ? 'B' : ultima <= 30 ? 'I' : ultima <= 45 ? 'N' : ultima <= 60 ? 'G' : 'O');
            document.getElementById('contador-balotas').innerText = balotas.length + "/75";

            // Historial de las 4 anteriores
            const ultimas = balotas.slice(-5, -1).reverse();
            let hHtml = "";
            for(let i=0; i<4; i++) hHtml += `<div class="bola-historial">${ultimas[i] || '-'}</div>`;
            document.getElementById('historial-bolas').innerHTML = hHtml;

            // Pintar la grilla de 75
            actualizarTablero75(balotas);
        }

        function renderizarCarton() {
            const container = document.getElementById('mi-carton');
            let html = '<div class="carton-container">';
            ['B', 'I', 'N', 'G', 'O'].forEach(l => html += `<div class="letra-bingo">${l}</div>`);
            
            const mapeoCarton = [0,5,10,15,20, 1,6,11,16,21, 2,7,12,17,22, 3,8,13,18,23, 4,9,14,19,24];
            mapeoCarton.forEach((idx) => {
                let num = miCartonNumeros[idx];
                if (num === 0) html += `<div class="numero-carton centro marcado">X</div>`;
                else html += `<div class="numero-carton" onclick="toggleMarca(this)">${num}</div>`;
            });
            container.innerHTML = html + '</div>';
        }

        const MAPEO_CARTON_75 = [0,5,10,15,20, 1,6,11,16,21, 2,7,12,17,22, 3,8,13,18,23, 4,9,14,19,24];

        function normalizarFigurasDesdeSala(datos) {
            let figuras = [];

            if (datos && Array.isArray(datos.figurasMultiples) && datos.figurasMultiples.length > 0) {
                figuras = datos.figurasMultiples
                    .filter(fig => fig && Array.isArray(fig.patron) && fig.patron.length === 25)
                    .map((fig, idx) => ({
                        nombre: (fig.nombre || `FIGURA ${idx + 1}`).toString().toUpperCase(),
                        patron: fig.patron.map(Boolean),
                        activa: fig.activa !== false
                    }));
            } else if (datos && Array.isArray(datos.figuraActual) && datos.figuraActual.length === 25) {
                figuras = [{
                    nombre: (datos.nombreFigura || 'BINGO').toString().toUpperCase(),
                    patron: datos.figuraActual.map(Boolean),
                    activa: true
                }];
            }

            return figuras;
        }

        function actualizarFigurasDesdeSala(datos) {
            figurasMultiplesGlobal = normalizarFigurasDesdeSala(datos);
            const activas = obtenerFigurasActivasJugador();

            if (activas.length) {
                figuraGlobal = activas[0].patron;
                document.getElementById('nombre-figura-display').innerText = activas.map(f => f.nombre).join(' + ');
                renderizarFigura(figuraGlobal);
            } else {
                figuraGlobal = [];
                document.getElementById('nombre-figura-display').innerText = '---';
                renderizarFigura(new Array(25).fill(false));
            }

            renderizarFigurasMultiples(figurasMultiplesGlobal);
        }

        function obtenerFigurasActivasJugador() {
            if (Array.isArray(figurasMultiplesGlobal) && figurasMultiplesGlobal.length) {
                return figurasMultiplesGlobal.filter(fig => fig && fig.activa !== false && Array.isArray(fig.patron) && fig.patron.some(Boolean));
            }
            if (Array.isArray(figuraGlobal) && figuraGlobal.length === 25 && figuraGlobal.some(Boolean)) {
                return [{ nombre: document.getElementById('nombre-figura-display').innerText || 'BINGO', patron: figuraGlobal, activa: true }];
            }
            return [];
        }

        function figuraEstaCompletaJugador(patron) {
            if (!Array.isArray(patron) || patron.length !== 25) return false;
            for (let i = 0; i < 25; i++) {
                if (!patron[i]) continue;

                const numeroEnCarton = miCartonNumeros[MAPEO_CARTON_75[i]];

                // Centro libre: no necesita balota llamada.
                if (numeroEnCarton === 0) continue;

                if (!balotasGlobales.includes(numeroEnCarton)) return false;
            }
            return true;
        }

        function obtenerFigurasCompletadasJugador(figurasActivas) {
            return figurasActivas.filter(fig => figuraEstaCompletaJugador(fig.patron));
        }

        function crearMiniFiguraJugador(fig) {
            const item = document.createElement('div');
            item.className = 'figura-mini-item' + (fig.activa === false ? ' inactiva' : '');

            const estado = document.createElement('div');
            estado.className = 'figura-mini-estado';
            estado.innerText = fig.activa === false ? 'INACTIVA' : 'ACTIVA';

            const grid = document.createElement('div');
            grid.className = 'figura-mini-grid';
            fig.patron.forEach(marcada => {
                const celda = document.createElement('div');
                celda.className = 'celda-figura' + (marcada ? ' activa' : '');
                grid.appendChild(celda);
            });

            const nombre = document.createElement('div');
            nombre.className = 'figura-mini-nombre';
            nombre.innerText = fig.nombre || 'FIGURA';
            nombre.title = fig.nombre || 'FIGURA';

            item.appendChild(estado);
            item.appendChild(grid);
            item.appendChild(nombre);
            return item;
        }

        function renderizarFigurasMultiples(figuras) {
            const cont = document.getElementById('figuras-multiples-display');
            const fallback = document.getElementById('figura-objetivo');
            const fallbackName = document.getElementById('nombre-figura-display');
            if (!cont) return;

            cont.innerHTML = '';
            const lista = Array.isArray(figuras) ? figuras : [];

            if (!lista.length) {
                if (fallback) fallback.classList.remove('figura-fallback-oculta');
                if (fallbackName) fallbackName.classList.remove('figura-fallback-oculta');
                return;
            }

            if (fallback) fallback.classList.add('figura-fallback-oculta');
            if (fallbackName) fallbackName.classList.add('figura-fallback-oculta');
            lista.forEach(fig => cont.appendChild(crearMiniFiguraJugador(fig)));
        }

        function renderizarFigura(figuraArray) {
             const container = document.getElementById('figura-objetivo');
             container.innerHTML = '';
             for(let i=0; i<25; i++) {
                 let div = document.createElement('div');
                 div.className = 'celda-figura' + (figuraArray[i] ? ' activa' : '');
                 container.appendChild(div);
             }
        }

        function inicializarTablero75() {
            const tablero = document.getElementById('tablero-75');
            let html = '';
            const filas = [
                { l: 'B', min: 1, max: 15, c: '#004080' },
                { l: 'I', min: 16, max: 30, c: '#d32f2f' },
                { l: 'N', min: 31, max: 45, c: '#757575' },
                { l: 'G', min: 46, max: 60, c: '#28a745' },
                { l: 'O', min: 61, max: 75, c: '#fbc02d' }
            ];
            filas.forEach(f => {
                html += `<div class="letra-75" style="background:${f.c}">${f.l}</div>`;
                for(let i=f.min; i<=f.max; i++) html += `<div class="num-75" id="mini-${i}">${i}</div>`;
            });
            tablero.innerHTML = html;
        }

        function actualizarTablero75(balotas) {
            for(let i=1; i<=75; i++) {
                const celda = document.getElementById(`mini-${i}`);
                if(celda) {
                    if(balotas.includes(i)) celda.classList.add('activa');
                    else celda.classList.remove('activa');
                }
            }
        }
       // --- CÓDIGO PARA PRECARGAR SALA, CARTÓN Y VIDEO DESDE LA URL ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            const salaQuery = urlParams.get('sala');
            const cartonQuery = urlParams.get('carton');
            const videoQuery = urlParams.get('video'); // Leemos el video

            const salaHash = window.location.hash.substring(1);
            const codigoDetectado = salaQuery || salaHash;

            if (codigoDetectado) document.getElementById('codigo-sala').value = codigoDetectado.toUpperCase();
            if (cartonQuery) document.getElementById('numero-carton').value = cartonQuery;
            
            // Guardamos el ID del video temporalmente para usarlo al darle "Ingresar"
            // Si no pones nada en la URL, cargará el tuyo por defecto.
            window.videoEnvivoID = videoQuery || "E_MHOm8Lv1A"; 

            if (codigoDetectado && cartonQuery) document.getElementById('nombre-jugador').focus();
        });
    </script>
</body>
