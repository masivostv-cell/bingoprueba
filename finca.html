<section class="peticoca-contract-page">
  <div class="peticoca-contract-header">
    <p class="peticoca-eyebrow">CABAÑA LA PETICOCA</p>
    <h1>Contrato de alojamiento turístico</h1>
    <p>Chinácota, Norte de Santander</p>
  </div>

  <div class="peticoca-mobile-link">
    <a id="peticocaFullScreenLink" href="#" target="_blank" rel="noopener">
      Abrir el formulario en pantalla completa
    </a>
  </div>

  <div class="peticoca-contract-frame">
    <iframe
      id="peticocaContractFrame"
      title="Formulario de contrato de alojamiento Cabaña La Peticoca"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="clipboard-write"
    ></iframe>
  </div>

  <noscript>
    Para diligenciar el contrato debe activar JavaScript en su navegador.
  </noscript>
</section>

<style>
  .peticoca-contract-page {
    width: 100%;
    margin: 0;
    padding: 14px 8px 35px;
    overflow-x: hidden;
    background: #f5f8f6;
    font-family: Arial, Helvetica, sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  .peticoca-contract-header {
    width: min(1180px, 100%);
    margin: 0 auto 12px;
    padding: 24px 17px;
    border-radius: 15px;
    background: linear-gradient(135deg, #274f40, #3d6b59);
    color: #ffffff;
    text-align: center;
    box-shadow: 0 10px 25px rgba(28, 67, 51, 0.16);
  }

  .peticoca-contract-header h1 {
    margin: 4px 0 7px;
    font-size: clamp(27px, 5vw, 39px);
    line-height: 1.15;
  }

  .peticoca-contract-header p {
    margin: 0;
    font-size: 16px;
  }

  .peticoca-eyebrow {
    font-size: 12px !important;
    font-weight: 800;
    letter-spacing: 1.5px;
    opacity: .88;
  }

  .peticoca-mobile-link {
    display: none;
    width: min(1180px, 100%);
    margin: 0 auto 10px;
  }

  .peticoca-mobile-link a {
    display: block;
    padding: 13px;
    border-radius: 10px;
    background: #e6f0eb;
    color: #274f40;
    font-size: 16px;
    font-weight: 800;
    text-align: center;
    text-decoration: none;
  }

  .peticoca-contract-frame {
    width: min(1180px, 100%);
    margin: 0 auto;
    overflow: hidden;
    border: 1px solid #cbd8d2;
    border-radius: 15px;
    background: #ffffff;
    box-shadow: 0 12px 30px rgba(28, 67, 51, 0.12);
  }

  #peticocaContractFrame {
    display: block;
    width: 100%;
    min-height: 3400px;
    border: 0;
    background: #ffffff;
  }

  @media (max-width: 800px) {
    .peticoca-contract-page {
      padding: 6px 0 22px;
    }

    .peticoca-contract-header {
      border-radius: 9px;
      padding: 19px 12px;
    }

    .peticoca-contract-header h1 {
      font-size: 27px;
    }

    .peticoca-mobile-link {
      display: block;
      padding: 0 6px;
    }

    .peticoca-contract-frame {
      border-right: 0;
      border-left: 0;
      border-radius: 0;
    }

    #peticocaContractFrame {
      min-height: 4600px;
    }
  }
</style>

<script>
  (function () {
    /*
      REEMPLACE ESTA DIRECCIÓN por la URL /exec de su aplicación web.
    */
    const FORMULARIO_URL =
      'https://script.google.com/macros/s/AKfycby6cxdpv3rS5QP8cKwLt4kzNUsEokJJ5zEi7vOtT79YMPkPQHMuJ5LoHyuLoOupXOq5bg/exec';

    const iframe = document.getElementById('peticocaContractFrame');
    const fullScreenLink = document.getElementById('peticocaFullScreenLink');

    iframe.src = FORMULARIO_URL;
    fullScreenLink.href = FORMULARIO_URL;

    window.addEventListener('message', function (event) {
      const data = event.data;

      if (
        !data ||
        data.type !== 'PETICOCA_CONTRACT_HEIGHT' ||
        !Number.isFinite(Number(data.height))
      ) {
        return;
      }

      const safeHeight = Math.min(
        12000,
        Math.max(1000, Number(data.height) + 20)
      );

      iframe.style.height = safeHeight + 'px';
    });
  })();
</script>
